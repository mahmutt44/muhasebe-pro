{% extends "base.html" %}

{% block title %}Şifre Değiştir - {{ t.app_name }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card" style="background: var(--card-bg); border: 1px solid var(--border-color);">
                <div class="card-header text-center" style="background: var(--primary-gradient);">
                    <h4 class="mb-0 text-white">
                        <i class="bi bi-key-fill me-2"></i>Şifre Değiştir
                    </h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-secondary text-center mb-4">
                        İlk giriş için geçici şifrenizi değiştirmeniz gerekiyor.
                    </p>
                    <form method="POST" action="{{ url_for('auth.change_password') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label text-light">Mevcut Şifre</label>
                            <input type="password" name="current_password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">Yeni Şifre</label>
                            <input type="password" name="new_password" class="form-control" minlength="6" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">Yeni Şifre (Tekrar)</label>
                            <input type="password" name="confirm_password" class="form-control" minlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" style="background: var(--primary-gradient);">
                            <i class="bi bi-check-circle me-2"></i>Şifreyi Değiştir
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
